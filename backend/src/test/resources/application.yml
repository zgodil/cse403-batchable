# Test defaults so full Spring context loads when env vars are not set (e.g. in CI).
# Real integration tests that call Google/Twilio should set real env vars or be skipped.
google:
  routes:
    api-key: ${GOOGLE_ROUTES_API_KEY:test-api-key}
    base-url: https://routes.googleapis.com
twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:test-sid}
  auth-token: ${TWILIO_AUTH_TOKEN:test-token}
  phone-number: ${TWILIO_PHONE_NUMBER:+15551234567}
  driver-phone-number: ${TWILIO_DRIVER_PHONE_NUMBER:+15559876543}
