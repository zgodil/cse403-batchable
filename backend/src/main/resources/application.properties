spring.application.name=backend
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-3qj8cn8ady6wwlng.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://batchable-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/appdb}
spring.datasource.username=${DB_USER:app_user}
spring.datasource.password=${DB_PASSWORD:app_password}
spring.datasource.driver-class-name=org.postgresql.Driver

server.ssl.key-store=classpath:springboot.p12
server.ssl.key-store-password=password
server.ssl.key-store-type=pkcs12
server.ssl.key-alias=1
server.ssl.key-password=password

server.port=${LOCATION_PORT:10000}
