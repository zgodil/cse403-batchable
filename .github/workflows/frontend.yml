name: Frontend CI

on: [push, pull_request]

env:
  LOCATION_PROTOCOL: ${{ variables.LOCATION_PROTOCOL }}
  LOCATION_HOST: ${{ variables.LOCATION_HOST }}
  LOCATION_PORT: ${{ variables.LOCATION_PORT }}

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Build
      run: npm install

    - name: Run Tests
      run: npm test
