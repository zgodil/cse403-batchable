# Java CI for batchable backend
# Builds project and runs unit & integration tests with annotations

name: Java CI for batchable backend
on: [push, pull_request]

env:
  GOOGLE_ROUTES_API_KEY: ${{ secrets.GOOGLE_ROUTES_API_KEY }}
  TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
  TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
  TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
  TWILIO_DRIVER_PHONE_NUMBER: ${{ secrets.TWILIO_DRIVER_PHONE_NUMBER }}
  LOCATION_PROTOCOL: ${{ variables.LOCATION_PROTOCOL }}
  LOCATION_HOST: ${{ variables.LOCATION_HOST }}
  LOCATION_PORT: ${{ variables.LOCATION_PORT }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build project
        run: ./mvnw -B package -DskipTests

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Unit Tests
        run: ./mvnw clean test -Dtest=*Test.java
      - name: Annotate Unit Test Results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit Tests
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit

  ci-integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: build
    services:
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run migrations
        run: |
          for f in $(ls ../infra/postgres/migrations/*.sql | sort); do
            PGPASSWORD=app_password psql -h localhost -p 5433 -U app_user -d appdb -f "$f"
          done
      - name: Run CI Integration Tests
        run: ./mvnw clean verify -Dtest=*IT_CI.java -Djacoco.skip=true
      - name: Annotate CI Integration Test Results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: CI Integration Tests
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: build
    services:
      postgres:
        image: postgres:16
        ports:
          - 5433:5432
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: app_user
          POSTGRES_PASSWORD: app_password
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Run migrations
        run: |
          for f in $(ls ../infra/postgres/migrations/*.sql | sort); do
            PGPASSWORD=app_password psql -h localhost -p 5433 -U app_user -d appdb -f "$f"
          done
      - name: Run full verify
        run: ./mvnw clean verify
      - name: Annotate Verify Test Results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Full Verify
          path: backend/target/surefire-reports/*.xml
          reporter: java-junit
