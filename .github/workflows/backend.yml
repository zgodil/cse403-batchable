# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven
# Also executes additional tests for the batchable backend

name: Java CI for batchable backend
on: [push, pull_request]

env:
  GOOGLE_ROUTES_API_KEY: ${{ secrets.GOOGLE_ROUTES_API_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build project
        run: ./mvnw -B package -DskipTests
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-jar
          path: target/*.jar

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Unit Tests
        run: ./mvnw clean test -Dtest=*Test.java
      - name: Upload Unit Test Reports
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-reports
          path: target/surefire-reports/
      - name: Annotate Unit Test Results in GitHub
        uses: dorny/test-reporter@v2
        with:
          name: Unit Tests
          path: target/surefire-reports/*.xml
          reporter: junit

  ci-integration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run CI Integration Tests
        run: ./mvnw clean verify -Dtest=*CI_IT.java
      - name: Upload CI Integration Test Reports
        uses: actions/upload-artifact@v3
        with:
          name: ci-integration-test-reports
          path: target/failsafe-reports/
      - name: Annotate CI Integration Test Results in GitHub
        uses: dorny/test-reporter@v2
        with:
          name: CI Integration Tests
          path: target/failsafe-reports/*.xml
          reporter: junit

    